# 기본 모델을 정한다. 현재 값은 Codex 작업에 가벼운 응답 속도와 충분한 품질의 균형을 맞추는 설정이다.
# 대표 대안은 더 강한 모델로 바꾸는 경우와 더 작은 모델로 낮추는 경우가 있다.
# 값을 높이면 복잡한 작업의 품질이 좋아질 수 있지만 비용과 지연이 늘고, 낮추면 더 빠르지만 추론 여유가 줄어든다.
model = "gpt-5.4-mini"

# 일반 작업에서의 추론 강도를 정한다. 현재 값은 보통 수준의 사고 깊이를 유지하는 설정이다.
# 대표 대안은 `low`, `medium`, `high`이며, 필요에 따라 응답 속도와 사고 깊이의 균형을 바꿀 수 있다.
# 값을 높이면 더 꼼꼼하게 판단하지만 느려질 수 있고, 낮추면 더 빠르지만 복잡한 문제에서 품질이 흔들릴 수 있다.
model_reasoning_effort = "medium"

# 계획 모드에서의 추론 강도를 정한다. 현재 값은 계획을 세울 때 더 깊게 검토하도록 만드는 설정이다.
# 대표 대안은 `low`, `medium`, `high`이며, 계획이 단순하면 낮추고 복잡하면 높일 수 있다.
# 값을 높이면 계획 품질은 좋아질 수 있지만 시간이 늘고, 낮추면 빠르지만 누락 가능성이 커진다.
plan_mode_reasoning_effort = "high"

# 샌드박스가 파일 시스템을 얼마나 넓게 허용할지 정한다. 현재 값은 작업 공간 안에서만 쓰기 가능한 설정이다.
# 대표 대안은 `read-only`, `workspace-write`, `danger-full-access`가 있다.
# 값을 높이면 더 많은 작업이 가능하지만 위험이 커지고, 낮추면 더 안전하지만 수정 가능한 범위가 줄어든다.
sandbox_mode = "workspace-write"

# 승인 요청이 필요한 작업을 어떻게 처리할지 정한다. 현재 값은 필요한 경우 사용자 승인을 받는 설정이다.
# 대표 대안은 `auto` 계열의 더 자동화된 정책과 더 엄격한 차단 정책이 있다.
# 값을 완화하면 작업은 빨라질 수 있지만 통제가 줄고, 강화하면 더 안전하지만 추가 확인이 늘어난다.
approval_policy = "on-request"

[agents]
# 동시에 돌릴 수 있는 에이전트 수를 정한다. 현재 값은 최대 4개까지 허용하는 설정이다.
# 대표 대안은 더 적은 수나 더 많은 수로 조정하는 방식이다.
# 값을 높이면 병렬 처리가 늘 수 있지만 자원 사용이 커지고, 낮추면 안정적이지만 처리량이 줄어든다.
max_threads = 4

# 에이전트가 얼마나 깊게 하위 작업을 나눌지 정한다. 현재 값은 1단계까지만 허용한다.
# 대표 대안은 더 깊은 중첩을 허용하거나, 0에 가깝게 줄여 단순화하는 방식이다.
# 값을 높이면 더 복잡한 작업 분해가 가능하지만 관리가 어려워지고, 낮추면 단순하지만 유연성이 줄어든다.
max_depth = 1

# 하나의 작업이 허용되는 최대 실행 시간을 정한다. 현재 값은 1800초로, 장시간 작업을 허용한다.
# 대표 대안은 더 짧은 제한이나 더 긴 제한을 두는 방식이다.
# 값을 높이면 긴 작업을 끝까지 돌릴 수 있지만 정체가 길어질 수 있고, 낮추면 멈춤을 빨리 감지하지만 큰 작업이 잘릴 수 있다.
job_max_runtime_seconds = 1800

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 20
required = false

[mcp_servers.firecrawl]
command = "powershell.exe"
args = ["-NoProfile", "-ExecutionPolicy", "Bypass", "-File", ".codex/mcp/firecrawl.ps1"]
startup_timeout_sec = 20
required = false

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_sec = 20
required = false
